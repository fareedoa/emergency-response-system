spring:
  application:
    name: auth-service
  config:
    import: optional:file:.env[.properties], optional:file:./backend/auth-service/.env[.properties], optional:file:./auth-service/.env[.properties]

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000
      database: 0

server:
  port: 8081

app:
  jwt:
    secret: ${SECRET_KEY}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
logging:
  level:
    com.backend.project: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health