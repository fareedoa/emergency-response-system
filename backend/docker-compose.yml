version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ers-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: emergency_response
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ers-network

  redis:
    image: redis:7-alpine
    container_name: ers-redis
    ports:
      - "6379:6379"
    networks:
      - ers-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ers-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ers-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ers-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/emergency_response_auth
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - ers-network

  incident-service:
    build:
      context: ./incident-service
      dockerfile: Dockerfile
    container_name: ers-incident-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/emergency_response_incident
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - ers-network

  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: ers-tracking-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/emergency_response_tracking
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - ers-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: ers-analytics-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/emergency_response_analytics
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - rabbitmq
      - redis
    networks:
      - ers-network

networks:
  ers-network:
    driver: bridge

volumes:
  postgres-data:
