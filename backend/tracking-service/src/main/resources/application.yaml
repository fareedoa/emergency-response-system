spring:
  application:
    name: tracking-service
  config:
    import: optional:file:.env[.properties], optional:file:./backend/tracking-service/.env[.properties], optional:file:./tracking-service/.env[.properties]

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8083

app:
  jwt:
    secret: ${SECRET_KEY}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.emergency.incident_service: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
